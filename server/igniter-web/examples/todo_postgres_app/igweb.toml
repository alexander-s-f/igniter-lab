# igweb.toml — Postgres-shaped IgWeb Todo API (LAB-TODOAPP-API-SHAPE-P2). Same no-Rust authoring path as
# todo_app/todo_v2_app: `[app]` is author-owned; `[server]`/`[middleware]` are host policy. No routes,
# bind address, secrets, capability ids, or effect identity live here. "Postgres-shaped" means the `.ig`
# contracts MIRROR the DB boundary (QueryPlan / WriteIntent) — it opens NO database connection.

[app]
entry = "Serve"
# sources omitted → all *.ig + *.igweb in this directory (deterministic): todo_handlers.ig + routes.igweb.

[server]
mode = "loopback"
max_requests = 16

[middleware]
trace = true
body_limit_bytes = 65536
